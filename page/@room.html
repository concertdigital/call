<html>
<head>
    <title>Room - Call by Concert</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="icon" href="/asset/favicon.svg" sizes="any" type="image/svg+xml">
    <script src="/script/script.js"></script>
</head>
<body>
    <div class="logo"></div>
    <video id="localVideo" autoplay playsinline muted></video>
    <div id="remoteVideosContainer">
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div id="controls">
        <button id="micBtn" onclick="toggleMic()" title="Toggle Microphone" class="active">
            <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/>
                <path d="M19 10v1a7 7 0 0 1-14 0v-1H3v1a9 9 0 0 0 8 8.94V22h2v-2.06A9 9 0 0 0 21 11v-1h-2z"/>
            </svg>
        </button>

        <button id="screenBtn" onclick="toggleScreenShare()" title="Toggle Screen Share">
            <svg id="screenIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                <path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7v2H8v2h8v-2h-2v-2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/>
            </svg>
        </button>

        <button id="copyLinkBtn" onclick="copyRoomLink()" title="Copy Room Link">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                <path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4v2h-4c-.61 0-1.1.49-1.1 1.1s.49 1.1 1.1 1.1h4v2h-4c-1.71 0-3.1-1.39-3.1-3.1zm6.6-1h4v2h-4v-2zm10.4 1c0 1.71-1.39 3.1-3.1 3.1h-4v-2h4c.61 0 1.1-.49 1.1-1.1s-.49-1.1-1.1-1.1h-4v-2h4c1.71 0 3.1 1.39 3.1 3.1z"/>
            </svg>
        </button>

        <button id="endCallBtn" onclick="endCall()" title="End Call">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="red" viewBox="0 0 24 24">
                <path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2a1 1 0 011.11-.21c1.21.48 2.53.74 3.88.74a1 1 0 011 1v3.5a1 1 0 01-1 1C10.07 21 3 13.93 3 5.5a1 1 0 011-1H7.5a1 1 0 011 1c0 1.35.26 2.67.74 3.88a1 1 0 01-.21 1.11l-2.2 2.2z"/>
            </svg>
        </button>
    </div>
</body>
</html>
